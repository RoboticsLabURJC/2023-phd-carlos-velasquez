# Root Jekyll entrypoint so `jekyll serve` works from the repository root.
source: docs
destination: _site

# Theme Settings
remote_theme           : "mmistakes/minimal-mistakes"
minimal_mistakes_skin  : "air"

# Site Settings
locale                 : "en-US"
title                  : "Robotics Lab URJC"
title_separator        : "-"
subtitle               : Programming Robot Intelligence
name                   : "Carlos Andrés Velásquez Ospina"
description            : "Autonomous Driving"
url                    : https://roboticslaburjc.github.io
baseurl                :
repository             :
teaser                 :
logo                   : "/assets/images/logo.png"
masthead_title         :
words_per_minute       : 200
comments:
  provider             :
  disqus:
    shortname          :
  discourse:
    server             :
  facebook:
    appid              :
    num_posts          :
    colorscheme        :
  utterances:
    theme              :
    issue_term         :
  giscus:
    repo_id            :
    category_name      :
    category_id        :
    discussion_term    :
    reactions_enabled  :
    theme              :
  staticman:
    branch             :
    endpoint           :
reCaptcha:
  siteKey              :
  secret               :
atom_feed:
  path                 :
  hide                 :
search                 :
search_full_content    :
search_provider        :
lunr:
  search_within_pages  :
algolia:
  application_id       :
  index_name           :
  search_only_api_key  :
  powered_by           :
google:
  search_engine_id     :
  instant_search       :
google_site_verification :
bing_site_verification   :
naver_site_verification  :
yandex_site_verification :
baidu_site_verification  :

# Social Sharing
twitter:
  username             :
facebook:
  username             :
  app_id               :
  publisher            :
og_image               :
social:
  type                 :
  name                 :
  links:

# Analytics
analytics:
  provider             : false
  google:
    tracking_id        :
    anonymize_ip       :

# Site Author
author:
  name                 : "Carlos Velásquez"
  avatar               : "/assets/images/me.jpg"
  bio                  : "Doctoral thesis blog"
  location             : "Medellín"
  email                : "canveo@gmail.com"
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:canveo@gmail.com"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/canveo"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/canveo/"

# Site Footer
footer:
  links:
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square"
    - label: "Facebook"
      icon: "fab fa-fw fa-facebook-square"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
    - label: "GitLab"
      icon: "fab fa-fw fa-gitlab"
    - label: "Bitbucket"
      icon: "fab fa-fw fa-bitbucket"
    - label: "Instagram"
      icon: "fab fa-fw fa-instagram"

# Reading Files
include:
  - .htaccess
  - _pages
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/plugins
  - assets/js/_main.js
  - assets/js/vendor
  - Capfile
  - CHANGELOG
  - config
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - log
  - node_modules
  - package.json
  - package-lock.json
  - Rakefile
  - README
  - tmp
  - /docs
  - /test
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:categories/:title/
paginate: 5
paginate_path: /page:num/
timezone:

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# mimic GitHub Pages with --safe
whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments:
      share: true
      related: true
